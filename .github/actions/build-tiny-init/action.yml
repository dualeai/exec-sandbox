name: Build tiny-init
description: Build tiny-init Rust binary for specified architecture

inputs:
  arch:
    description: Target architecture (x86_64 or aarch64)
    required: true
  rust-version:
    description: Rust toolchain version (sourced from Makefile rust_version)
    required: true

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

    - name: Set up Docker Buildx
      uses: useblacksmith/setup-docker-builder@44c43c0599d417cb00afb09a18ee099347a34b70 # v1
      with:
        github-token: ${{ github.token }}

    # Try to restore from latest run on same branch (hash-based caching in build script will skip if unchanged)
    - name: Get latest run ID
      id: latest-run
      shell: bash
      run: |
        RUN_ID=$(gh run list \
          --workflow=test.yml \
          --branch="${{ github.ref_name }}" \
          --limit=100 \
          --json databaseId,conclusion \
          --jq '[.[] | select(.conclusion == "success" or .conclusion == "failure")] | .[0].databaseId // empty')
        echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Download previous build
      if: steps.latest-run.outputs.run_id != ''
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: tiny-init-${{ inputs.arch == 'x86_64' && 'x64' || 'arm64' }}
        path: images/dist/
        github-token: ${{ github.token }}
        run-id: ${{ steps.latest-run.outputs.run_id }}
      continue-on-error: true

    - name: Build tiny-init
      shell: bash
      env:
        RUST_VERSION: ${{ inputs.rust-version }}
      run: ./scripts/build-tiny-init.sh ${{ inputs.arch }}
