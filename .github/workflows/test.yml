name: Test

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read
  id-token: write  # CodSpeed benchmarks (OpenID Connect authentication)

jobs:
  # ==========================================================================
  # Static Analysis - Run immediately, no dependencies
  # ==========================================================================

  static-python:
    name: Static / Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.1

      - name: Setup uv
        uses: astral-sh/setup-uv@v7.1.6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.12"

      - name: Install
        run: make install-deps

      - name: Static checks
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run pyright .
          uv run -m vulture src/ scripts/ --min-confidence 80

  static-rust-guest-agent:
    name: Static / Rust (guest-agent)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: guest-agent
    steps:
      - uses: actions/checkout@v6.0.1

      - name: Get Rust version
        id: rust
        run: echo "version=$(make --silent rust-version)" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Static checks
        run: make RUST_VERSION=${{ steps.rust.outputs.version }} test-static

  static-rust-tiny-init:
    name: Static / Rust (tiny-init)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tiny-init
    steps:
      - uses: actions/checkout@v6.0.1

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          cache-workspaces: tiny-init

      - name: Get Rust version
        id: rust
        run: echo "version=$(make --silent rust-version)" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Static checks
        run: make RUST_VERSION=${{ steps.rust.outputs.version }} test-static

  static-go:
    name: Static / Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gvproxy-wrapper
    steps:
      - uses: actions/checkout@v6.0.1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: gvproxy-wrapper/go.sum

      - name: Static checks
        run: make test-static

  # ==========================================================================
  # Build - Run in parallel, once per architecture
  # ==========================================================================

  build-qemu:
    name: Build / QEMU (${{ matrix.arch }}-${{ matrix.os-version }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            os-version: noble
            runner: ubuntu-24.04
          - arch: arm64
            os-version: noble
            runner: ubuntu-24.04-arm
          # Jammy build for CodSpeed macro runners (Ubuntu 22.04 ARM64)
          - arch: arm64
            os-version: jammy
            runner: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v6.0.1

      # Cache the final build output — skip everything on version match.
      # Key includes qemu_version from Makefile, build script, and OS version;
      # bumping any invalidates the cache.
      # save-always is false (default), so a failed build won't cache corrupt output.
      - name: Cache QEMU build
        id: qemu-cache
        uses: actions/cache@v4
        with:
          path: ~/qemu-build
          key: qemu-${{ matrix.arch }}-${{ matrix.os-version }}-${{ hashFiles('Makefile', 'scripts/build-qemu.sh') }}

      - name: Install build deps
        if: steps.qemu-cache.outputs.cache-hit != 'true'
        run: |
          # Remove Microsoft repos that can cause 403 errors
          # See: https://github.com/actions/runner-images/issues/9733
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update
          # See: https://wiki.qemu.org/Hosts/Linux
          sudo apt-get install -y ccache ninja-build meson libglib2.0-dev libfdt-dev libpixman-1-dev libseccomp-dev libslirp-dev liburing-dev flex bison

      - name: Cache ccache
        if: steps.qemu-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-qemu-${{ matrix.arch }}-${{ matrix.os-version }}-${{ hashFiles('Makefile', 'scripts/build-qemu.sh') }}
          restore-keys: ccache-qemu-${{ matrix.arch }}-${{ matrix.os-version }}-

      - name: Build
        if: steps.qemu-cache.outputs.cache-hit != 'true'
        run: make build-qemu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qemu-${{ matrix.arch }}-${{ matrix.os-version }}
          path: ~/qemu-build/
          retention-days: 1

  build-gvproxy-wrapper:
    name: Build / gvproxy-wrapper (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: x64
            runner: ubuntu-24.04
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: macos
            arch: x64
            runner: macos-15-intel
          - os: macos
            arch: arm64
            runner: macos-26
    steps:
      - uses: actions/checkout@v6.0.1

      - name: Build
        uses: ./.github/actions/build-gvproxy-wrapper

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gvproxy-wrapper-${{ matrix.os }}-${{ matrix.arch }}
          path: gvproxy-wrapper/bin/
          retention-days: 1

  build-guest-agent:
    name: Build / guest-agent (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'x64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    strategy:
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            image_arch: x86_64
          - arch: arm64
            image_arch: aarch64
    steps:
      - uses: actions/checkout@v6.0.1

      - name: Get Rust version
        id: rust
        run: echo "version=$(make --silent rust-version)" >> "$GITHUB_OUTPUT"

      - name: Build
        uses: ./.github/actions/build-guest-agent
        with:
          arch: ${{ matrix.image_arch }}
          rust-version: ${{ steps.rust.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: guest-agent-${{ matrix.arch }}
          path: |
            images/dist/guest-agent-linux-${{ matrix.image_arch }}
            images/dist/guest-agent-linux-${{ matrix.image_arch }}.hash
          retention-days: 7

  build-tiny-init:
    name: Build / tiny-init (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'x64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    strategy:
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            image_arch: x86_64
          - arch: arm64
            image_arch: aarch64
    steps:
      - uses: actions/checkout@v6.0.1

      - name: Get Rust version
        id: rust
        run: echo "version=$(make --silent rust-version)" >> "$GITHUB_OUTPUT"

      - name: Build
        uses: ./.github/actions/build-tiny-init
        with:
          arch: ${{ matrix.image_arch }}
          rust-version: ${{ steps.rust.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiny-init-${{ matrix.arch }}
          path: |
            images/dist/tiny-init-${{ matrix.image_arch }}
            images/dist/tiny-init-${{ matrix.image_arch }}.hash
          retention-days: 7

  build-vm-images:
    name: Build / VM images (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'x64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    needs: [build-guest-agent, build-tiny-init]
    strategy:
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            image_arch: x86_64
          - arch: arm64
            image_arch: aarch64
    steps:
      - uses: actions/checkout@v6.0.1

      - name: Download guest-agent
        uses: actions/download-artifact@v4
        with:
          name: guest-agent-${{ matrix.arch }}
          path: images/dist/

      - name: Download tiny-init
        uses: actions/download-artifact@v4
        with:
          name: tiny-init-${{ matrix.arch }}
          path: images/dist/

      - name: Get Alpine version
        id: alpine
        run: echo "version=$(make --silent alpine-version)" >> "$GITHUB_OUTPUT"

      - name: Build
        uses: ./.github/actions/build-vm-images
        with:
          arch: ${{ matrix.image_arch }}
          alpine-version: ${{ steps.alpine.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vm-images-${{ matrix.arch }}
          path: |
            images/dist/vmlinux-${{ matrix.image_arch }}
            images/dist/vmlinuz-${{ matrix.image_arch }}
            images/dist/vmlinuz-${{ matrix.image_arch }}.hash
            images/dist/initramfs-${{ matrix.image_arch }}
            images/dist/*-${{ matrix.image_arch }}.qcow2
            images/dist/*-${{ matrix.image_arch }}.qcow2.hash
          retention-days: 7

  # ==========================================================================
  # Unit Tests - Run in parallel with builds
  # ==========================================================================

  test-rust:
    name: Test / Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: guest-agent
    steps:
      - uses: actions/checkout@v6.0.1

      - name: Get Rust version
        id: rust
        run: echo "version=$(make --silent rust-version)" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Unit tests
        run: make RUST_VERSION=${{ steps.rust.outputs.version }} test-unit

  test-go:
    name: Test / Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gvproxy-wrapper
    steps:
      - uses: actions/checkout@v6.0.1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: gvproxy-wrapper/go.sum

      - name: Unit tests
        run: make test-unit

  # ==========================================================================
  # Integration Tests - Run after builds complete
  # ==========================================================================

  test-python:
    name: Test / Python ${{ matrix.python-version }} / ${{ matrix.test-type }} (${{ matrix.platform.os }}/${{ matrix.platform.arch }})
    runs-on: ${{ matrix.platform.runner }}
    needs: [build-qemu, build-gvproxy-wrapper, build-vm-images]
    env:
      # Pass GitHub token for API calls (increases rate limit from 60 to 1000 req/hour)
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14", "3.14t"]
        test-type: [func, sudo, slow]
        platform:
          - os: linux
            arch: x64
            runner: ubuntu-24.04
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: macos
            arch: x64
            runner: macos-15-intel
          - os: macos
            arch: arm64
            runner: macos-26
    steps:
      - uses: actions/checkout@v6.0.1

      - name: Download gvproxy-wrapper
        uses: actions/download-artifact@v4
        with:
          name: gvproxy-wrapper-${{ matrix.platform.os }}-${{ matrix.platform.arch }}
          path: gvproxy-wrapper/bin/

      - name: Download VM images
        uses: actions/download-artifact@v4
        with:
          name: vm-images-${{ matrix.platform.arch }}
          path: images/dist/

      - name: Make binaries executable
        run: chmod +x gvproxy-wrapper/bin/gvproxy-wrapper-*

      - name: Make images readable (Linux)
        if: matrix.platform.os == 'linux'
        run: |
          # Make files readable and directories traversable for qemu-vm user
          # Need to make parent directories traversable too (home dirs are often 700)
          chmod a+x /home/runner /home/runner/work
          chmod -R a+rX .

      - name: Setup VM infrastructure
        uses: ./.github/actions/setup-vm-infra
        with:
          os: ${{ matrix.platform.os }}
          arch: ${{ matrix.platform.arch }}

      - name: Verify QEMU installation
        run: |
          echo "=== QEMU binaries ==="
          which qemu-system-x86_64 || echo "qemu-system-x86_64 not found"
          which qemu-system-x86_64-microvm || echo "qemu-system-x86_64-microvm not found"
          which qemu-system-aarch64 || echo "qemu-system-aarch64 not found"
          echo ""
          echo "=== QEMU version ==="
          ${{ matrix.platform.arch == 'x64' && 'qemu-system-x86_64' || 'qemu-system-aarch64' }} --version
          echo ""
          echo "=== Available machine types (first 20) ==="
          ${{ matrix.platform.arch == 'x64' && 'qemu-system-x86_64' || 'qemu-system-aarch64' }} -machine help | head -20
          echo ""
          echo "=== Hardware acceleration ==="
          if [ "${{ matrix.platform.os }}" = "linux" ]; then
            ls -la /dev/kvm || echo "/dev/kvm not available"
          else
            sysctl kern.hv_support || echo "HVF not available"
          fi

      - name: Setup uv
        uses: astral-sh/setup-uv@v7.1.6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: make install-deps

      - name: Run tests (Linux)
        if: matrix.platform.os == 'linux'
        timeout-minutes: 90
        run: |
          # Move into delegated cgroup subtree so QEMU child processes can be managed
          echo $$ | sudo tee /sys/fs/cgroup/code-exec/runner/cgroup.procs > /dev/null
          # Remove nproc limit for current shell (PAM limits only apply to new logins)
          # QEMU creates many threads per VM; parallel tests can exhaust default limits
          # prlimit requires sudo to raise limits above current hard limit
          sudo prlimit --pid $$ --nproc=unlimited:unlimited
          # Activate qemu-vm group membership for socket access (chardev sockets are 0660)
          # Sudo tests require elevated privileges
          if [ "${{ matrix.test-type }}" = "sudo" ]; then
            sudo env "PATH=$PATH" sg qemu-vm -c "make test-${{ matrix.test-type }}"
          else
            sg qemu-vm -c "make test-${{ matrix.test-type }}"
          fi

      - name: Run tests (macOS)
        if: matrix.platform.os == 'macos'
        timeout-minutes: 90
        run: |
          if [ "${{ matrix.test-type }}" = "sudo" ]; then
            sudo make test-${{ matrix.test-type }}
          else
            make test-${{ matrix.test-type }}
          fi

  # ==========================================================================
  # CodSpeed Benchmarks — real VM operations
  # Reuses build artifacts from the same workflow run (current commit).
  # Runs on CodSpeed macro runners (bare-metal, low-noise).
  # ==========================================================================

  benchmarks:
    name: Benchmark / CodSpeed
    runs-on: codspeed-macro
    concurrency:
      group: codspeed-${{ github.ref }}
      cancel-in-progress: true
    needs: [build-qemu, build-gvproxy-wrapper, build-vm-images]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6.0.1

      # --- Download build artifacts (same as test-python) ---

      - name: Download gvproxy-wrapper
        uses: actions/download-artifact@v4
        with:
          name: gvproxy-wrapper-linux-arm64
          path: gvproxy-wrapper/bin/

      - name: Download VM images
        uses: actions/download-artifact@v4
        with:
          name: vm-images-arm64
          path: images/dist/

      - name: Make binaries executable
        run: chmod +x gvproxy-wrapper/bin/gvproxy-wrapper-*

      - name: Make files accessible
        run: |
          chmod -R a+rX .

      # --- QEMU + VM infrastructure (shared action) ---

      - name: Setup VM infrastructure
        uses: ./.github/actions/setup-vm-infra
        with:
          os: linux
          arch: arm64
          os-version: jammy

      # --- Python + deps ---

      - name: Setup uv
        uses: astral-sh/setup-uv@v7.1.6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Setup Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: make install-deps

      # --- Run benchmarks ---

      - name: Run benchmarks
        timeout-minutes: 30
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation,memory
          run: uv run pytest tests/benchmarks/ --codspeed -v --no-cov -p no:xdist -o "addopts="
