name: Test

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read
  id-token: write  # CodSpeed benchmarks (OpenID Connect authentication)

jobs:
  # ==========================================================================
  # Static Analysis - Run immediately, no dependencies
  # ==========================================================================

  static-python:
    name: Static / Python
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup uv
        uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.12"

      - name: Install
        run: make install-deps

      - name: Static checks
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run pyright .
          uv run -m vulture src/ scripts/ --min-confidence 80

  static-rust-guest-agent:
    name: Static / Rust (guest-agent)
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: guest-agent
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Get Rust version
        id: rust
        run: echo "version=$(make --silent rust-version)" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Static checks
        run: make RUST_VERSION=${{ steps.rust.outputs.version }} test-static

  static-rust-tiny-init:
    name: Static / Rust (tiny-init)
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: tiny-init
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1
        with:
          components: rustfmt, clippy
          cache-workspaces: tiny-init

      - name: Get Rust version
        id: rust
        run: echo "version=$(make --silent rust-version)" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Static checks
        run: make RUST_VERSION=${{ steps.rust.outputs.version }} test-static

  static-go:
    name: Static / Go
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: gvproxy-wrapper
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: "1.24"
          cache-dependency-path: gvproxy-wrapper/go.sum

      - name: Static checks
        run: make test-static

  # ==========================================================================
  # Build - Run in parallel, once per architecture
  # ==========================================================================

  build-qemu:
    name: Build / QEMU (${{ matrix.arch }}-${{ matrix.os-version }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            os-version: noble
            runner: ubuntu-24.04
          - arch: arm64
            os-version: noble
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      # Cache the final build output — skip everything on version match.
      # Key includes qemu_version from Makefile, build script, and OS version;
      # bumping any invalidates the cache.
      # save-always is false (default), so a failed build won't cache corrupt output.
      - name: Cache QEMU build
        id: qemu-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/qemu-build
          key: qemu-${{ matrix.arch }}-${{ matrix.os-version }}-${{ hashFiles('Makefile', 'scripts/build-qemu.sh') }}

      - name: Install build deps
        if: steps.qemu-cache.outputs.cache-hit != 'true'
        run: |
          # Remove Microsoft repos that can cause 403 errors
          # See: https://github.com/actions/runner-images/issues/9733
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update
          # See: https://wiki.qemu.org/Hosts/Linux
          sudo apt-get install -y ccache ninja-build meson libglib2.0-dev libfdt-dev libpixman-1-dev libseccomp-dev libslirp-dev liburing-dev flex bison python3-venv python3-tomli

      - name: Cache ccache
        if: steps.qemu-cache.outputs.cache-hit != 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.ccache
          key: ccache-qemu-${{ matrix.arch }}-${{ matrix.os-version }}-${{ hashFiles('Makefile', 'scripts/build-qemu.sh') }}
          restore-keys: ccache-qemu-${{ matrix.arch }}-${{ matrix.os-version }}-

      - name: Build
        if: steps.qemu-cache.outputs.cache-hit != 'true'
        run: make build-qemu

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: qemu-${{ matrix.arch }}-${{ matrix.os-version }}
          path: ~/qemu-build/
          retention-days: 1

  build-gvproxy-wrapper:
    name: Build / gvproxy-wrapper (${{ matrix.os }}${{ matrix.os_version && format('-{0}', matrix.os_version) || '' }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: x64
            runner: ubuntu-24.04
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: macos
            arch: arm64
            os_version: "15"
            runner: macos-15
          - os: macos
            arch: arm64
            os_version: "26"
            runner: macos-26
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Build
        uses: ./.github/actions/build-gvproxy-wrapper

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: gvproxy-wrapper-${{ matrix.os }}${{ matrix.os_version && format('-{0}', matrix.os_version) || '' }}-${{ matrix.arch }}
          path: gvproxy-wrapper/bin/
          retention-days: 1

  build-guest-agent:
    name: Build / guest-agent (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'x64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    strategy:
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            image_arch: x86_64
          - arch: arm64
            image_arch: aarch64
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Get Rust version
        id: rust
        run: echo "version=$(make --silent rust-version)" >> "$GITHUB_OUTPUT"

      - name: Build
        uses: ./.github/actions/build-guest-agent
        with:
          arch: ${{ matrix.image_arch }}
          rust-version: ${{ steps.rust.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: guest-agent-${{ matrix.arch }}
          path: |
            images/dist/guest-agent-linux-${{ matrix.image_arch }}
            images/dist/guest-agent-linux-${{ matrix.image_arch }}.hash
          retention-days: 7

  build-tiny-init:
    name: Build / tiny-init (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'x64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    strategy:
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            image_arch: x86_64
          - arch: arm64
            image_arch: aarch64
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Get Rust version
        id: rust
        run: echo "version=$(make --silent rust-version)" >> "$GITHUB_OUTPUT"

      - name: Build
        uses: ./.github/actions/build-tiny-init
        with:
          arch: ${{ matrix.image_arch }}
          rust-version: ${{ steps.rust.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: tiny-init-${{ matrix.arch }}
          path: |
            images/dist/tiny-init-${{ matrix.image_arch }}
            images/dist/tiny-init-${{ matrix.image_arch }}.hash
          retention-days: 7

  build-vm-images:
    name: Build / VM images (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'x64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    needs: [build-guest-agent, build-tiny-init]
    strategy:
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            image_arch: x86_64
          - arch: arm64
            image_arch: aarch64
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Download guest-agent
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: guest-agent-${{ matrix.arch }}
          path: images/dist/

      - name: Download tiny-init
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: tiny-init-${{ matrix.arch }}
          path: images/dist/

      - name: Get Alpine version
        id: alpine
        run: echo "version=$(make --silent alpine-version)" >> "$GITHUB_OUTPUT"

      - name: Build
        uses: ./.github/actions/build-vm-images
        with:
          arch: ${{ matrix.image_arch }}
          alpine-version: ${{ steps.alpine.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: vm-images-${{ matrix.arch }}
          path: |
            images/dist/vmlinux-${{ matrix.image_arch }}
            images/dist/vmlinuz-${{ matrix.image_arch }}
            images/dist/vmlinuz-${{ matrix.image_arch }}.hash
            images/dist/initramfs-${{ matrix.image_arch }}
            images/dist/*-${{ matrix.image_arch }}.qcow2
            images/dist/*-${{ matrix.image_arch }}.qcow2.hash
          retention-days: 7

  # ==========================================================================
  # Unit Tests - Run in parallel with builds
  # ==========================================================================

  test-rust:
    name: Test / Rust
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: guest-agent
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Get Rust version
        id: rust
        run: echo "version=$(make --silent rust-version)" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Unit tests
        run: make RUST_VERSION=${{ steps.rust.outputs.version }} test-unit

  test-go:
    name: Test / Go
    runs-on: ubuntu-24.04-arm
    env:
      JUNIT_XML: junit-gvproxy-wrapper.xml
    defaults:
      run:
        working-directory: gvproxy-wrapper
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: "1.24"
          cache-dependency-path: gvproxy-wrapper/go.sum

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Unit tests
        run: make test-unit
        env:
          JUNIT_XML: ${{ env.JUNIT_XML }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ env.JUNIT_XML }}
          path: gvproxy-wrapper/${{ env.JUNIT_XML }}
          if-no-files-found: ignore

  # ==========================================================================
  # Integration Tests - Run after builds complete
  # ==========================================================================

  test-python:
    name: Test / Python ${{ matrix.python-version }} / ${{ matrix.test-type }} (${{ matrix.platform.os }}/${{ matrix.platform.arch }})
    # Linux x64: RunsOn with nested-virt (KVM required for QEMU integration tests)
    # Linux arm64: GitHub-hosted (RunsOn doesn't support nested-virt on ARM)
    # macOS: GitHub-hosted (Apple Silicon HVF supports nested virtualization)
    runs-on: ${{ startsWith(matrix.platform.runner, 'runner=') && format('runs-on={0}-test-python-{1}/{2}', github.run_id, strategy.job-index, matrix.platform.runner) || matrix.platform.runner }}
    needs: [build-qemu, build-gvproxy-wrapper, build-vm-images]
    env:
      # Pass GitHub token for API calls (increases rate limit from 60 to 1000 req/hour)
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      JUNIT_XML: junit-exec-sandbox-${{ matrix.python-version }}-${{ matrix.test-type }}-${{ matrix.platform.os }}-${{ matrix.platform.arch }}.xml
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14", "3.14t"]
        test-type: [func, sudo, slow]
        platform:
          - os: linux
            arch: x64
            runner: "runner=8cpu-linux-x64/nested-virt"
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: macos-15
            arch: arm64
            runner: macos-15
          - os: macos-26
            arch: arm64
            runner: macos-26
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Download gvproxy-wrapper
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: gvproxy-wrapper-${{ matrix.platform.os }}-${{ matrix.platform.arch }}
          path: gvproxy-wrapper/bin/

      - name: Download VM images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vm-images-${{ matrix.platform.arch }}
          path: images/dist/

      - name: Make binaries executable
        run: chmod +x gvproxy-wrapper/bin/gvproxy-wrapper-*

      - name: Make images readable (Linux)
        if: matrix.platform.os == 'linux'
        run: |
          # Make files readable and directories traversable for qemu-vm user
          # Need to make parent directories traversable too (home dirs are often 700)
          # Use GITHUB_WORKSPACE to avoid hardcoding runner paths (differs between providers)
          dir="$GITHUB_WORKSPACE"
          while [ "$dir" != "/" ]; do
            chmod a+x "$dir" 2>/dev/null || break
            dir=$(dirname "$dir")
          done
          chmod -R a+rX .

      - name: Setup VM infrastructure
        uses: ./.github/actions/setup-vm-infra
        with:
          os: ${{ startsWith(matrix.platform.os, 'macos') && 'macos' || matrix.platform.os }}
          arch: ${{ matrix.platform.arch }}

      - name: Setup uv
        uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: make install-deps

      - name: Run tests (Linux)
        if: matrix.platform.os == 'linux'
        timeout-minutes: 90
        env:
          PYTEST_ADDOPTS: "--junit-xml=${{ env.JUNIT_XML }}"
        run: |
          # Enter the delegated cgroup subtree. cgroupv2 PID migration requires
          # write to the common ancestor's cgroup.procs — this initial move from
          # the system cgroup needs sudo (root owns /sys/fs/cgroup/cgroup.procs).
          # Once inside, exec_sandbox moves QEMU within the subtree without sudo.
          echo $$ | sudo tee /sys/fs/cgroup/code-exec/runner/cgroup.procs > /dev/null
          # Raise nproc for this shell (PAM limits only apply to new logins).
          sudo prlimit --pid $$ --nproc=unlimited:unlimited
          # Activate qemu-vm group membership for socket access (chardev sockets are 0660)
          # Sudo tests require elevated privileges
          if [ "${{ matrix.test-type }}" = "sudo" ]; then
            sudo env "PATH=$PATH" "PYTEST_ADDOPTS=$PYTEST_ADDOPTS" sg qemu-vm -c "make test-${{ matrix.test-type }}"
          else
            sg qemu-vm -c "make test-${{ matrix.test-type }}"
          fi

      - name: Run tests (macOS)
        if: startsWith(matrix.platform.os, 'macos')
        timeout-minutes: 90
        env:
          PYTEST_ADDOPTS: "--junit-xml=${{ env.JUNIT_XML }}"
        run: |
          if [ "${{ matrix.test-type }}" = "sudo" ]; then
            sudo env "PYTEST_ADDOPTS=$PYTEST_ADDOPTS" make test-${{ matrix.test-type }}
          else
            make test-${{ matrix.test-type }}
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ env.JUNIT_XML }}
          path: ${{ env.JUNIT_XML }}
          if-no-files-found: ignore

  # ==========================================================================
  # CodSpeed Benchmarks — real VM operations
  # Reuses build artifacts from the same workflow run (current commit).
  # Runs on CodSpeed macro runners (bare-metal, low-noise).
  # ==========================================================================

  benchmarks:
    name: Benchmark / CodSpeed
    runs-on: runs-on=${{github.run_id}}-benchmarks/runner=4cpu-linux-x64/nested-virt
    concurrency:
      group: codspeed-${{ github.ref }}
      cancel-in-progress: true
    needs: [build-qemu, build-gvproxy-wrapper, build-vm-images]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      # --- Download build artifacts (same as test-python) ---

      - name: Download gvproxy-wrapper
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: gvproxy-wrapper-linux-x64
          path: gvproxy-wrapper/bin/

      - name: Download VM images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vm-images-x64
          path: images/dist/

      - name: Make binaries executable
        run: chmod +x gvproxy-wrapper/bin/gvproxy-wrapper-*

      - name: Make images readable (Linux)
        run: |
          # Make files readable and directories traversable for qemu-vm user
          # Need to make parent directories traversable too (home dirs are often 700)
          # Use GITHUB_WORKSPACE to avoid hardcoding runner paths (differs between providers)
          dir="$GITHUB_WORKSPACE"
          while [ "$dir" != "/" ]; do
            chmod a+x "$dir" 2>/dev/null || break
            dir=$(dirname "$dir")
          done
          chmod -R a+rX .

      - name: Setup VM infrastructure
        uses: ./.github/actions/setup-vm-infra
        with:
          os: linux
          arch: x64

      - name: Setup uv
        uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.13"

      - name: Install
        run: make install-deps

      - name: Prepare benchmark environment
        run: |
          # CodSpeed memory mode uses memtrack which may restrict setuid/ptrace.
          # All privileged setup must happen here, in a normal step before CodSpeed.
          #
          # 1. Move the runner process ($PPID) into the delegated cgroup subtree.
          #    cgroupv2 PID migration requires write access to the common ancestor's
          #    cgroup.procs.  Once the runner is inside code-exec/runner/, all child
          #    processes (CodSpeed → pytest → exec_sandbox → QEMU)
          #    inherit that cgroup via fork().  Subsequent intra-subtree moves
          #    (e.g. code-exec/runner/ → code-exec/exec-sandbox/session-xxx/) only
          #    need write to code-exec/cgroup.procs, which is runner-owned.
          #    Ref: https://docs.kernel.org/admin-guide/cgroup-v2.html#delegation
          echo $PPID | sudo tee /sys/fs/cgroup/code-exec/runner/cgroup.procs > /dev/null
          #
          # 2. Raise nproc limit on the runner process so CodSpeed inherits it.
          #    PAM limits only apply to new logins; prlimit modifies the live process.
          sudo prlimit --pid $PPID --nproc=unlimited:unlimited

      - name: Run benchmarks
        timeout-minutes: 30
        uses: CodSpeedHQ/action@1c8ae4843586d3ba879736b7f6b7b0c990757fab # v4
        with:
          mode: walltime,memory
          run: |
            # No privileged setup needed here — the pre-step moved the runner
            # process into the delegated cgroup and raised nproc.  This process
            # inherits both via fork().  Under ptrace, probe_sudo_as_qemu_vm()
            # returns False, so QEMU runs as the current user (sockets are
            # runner-owned, no sg/group membership needed).
            uv run pytest tests/benchmarks/ --codspeed -v --no-cov -p no:xdist -o 'addopts='
